<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Employee Courses Recommendations{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar sticky-top shadow-sm mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <span class="h5 mb-0">Talent Growth Hub</span>
            </a>
            <div class="navbar-nav flex-row gap-3">
                <a class="nav-link" href="/">Company goals</a>
                <a class="nav-link" href="/employees">Employee directory</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer class="mt-5 py-4 border-top">
        <div class="container-fluid text-center text-muted small">
            <p>&copy; 2026 Employee Recommendations System</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
